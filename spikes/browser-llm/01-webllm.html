<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spike: WebLLM (Gemma 2B)</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
  h1 { color: #60a5fa; }
  .panel { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin: 16px 0; }
  .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #334155; font-family: monospace; font-size: 13px; }
  .stat:last-child { border: none; }
  .stat .label { color: #94a3b8; }
  .stat .value { color: #fbbf24; }
  button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 4px; }
  button:disabled { background: #475569; cursor: not-allowed; }
  pre { background: #0f172a; padding: 12px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
  .progress { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin: 8px 0; }
  .progress-fill { background: #60a5fa; height: 100%; transition: width 0.2s; }
</style>
</head>
<body>
<h1>Spike 01: WebLLM</h1>
<p>Library: <code>@mlc-ai/web-llm</code> (MLC compiler · WebGPU) · Model: <code>gemma-2-2b-it-q4f16_1-MLC</code></p>

<div class="panel">
  <div class="stat"><span class="label">Status</span><span id="status" class="value">idle</span></div>
  <div class="stat"><span class="label">Model load time</span><span id="load-time" class="value">—</span></div>
  <div class="stat"><span class="label">First token (TTFT)</span><span id="ttft" class="value">—</span></div>
  <div class="stat"><span class="label">Tokens/sec</span><span id="tps" class="value">—</span></div>
  <div class="stat"><span class="label">Total tokens</span><span id="tokens" class="value">—</span></div>
  <div class="progress"><div id="progress-fill" class="progress-fill" style="width: 0%"></div></div>
</div>

<button id="load-btn" onclick="loadModel()">1. Load Gemma 2B (~1.5 GB first time)</button>
<button id="run-btn" onclick="runInference()" disabled>2. Run photo critique test</button>

<div class="panel">
  <strong>Test prompt</strong>
  <pre id="prompt"></pre>
</div>

<div class="panel">
  <strong>Output</strong>
  <pre id="output">(none yet)</pre>
</div>

<div class="panel">
  <strong>Console</strong>
  <pre id="log"></pre>
</div>

<script type="module">
const PROMPT = `You are a photography coach. A user uploaded a photo with the following observed properties:

- Filename: sunset-coast.jpg
- Camera: shot at 35mm, f/2.8, 1/200s, ISO 200
- Histogram: balanced exposure, slightly under in shadows
- Composition: subject placed near the centre
- Time of day: golden hour (warm tones)

Write a 3-sentence constructive critique of this photo. Focus on composition and lighting.`;

const log = (msg) => {
  const el = document.getElementById('log');
  el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
};
const setStatus = (s) => document.getElementById('status').textContent = s;
const setStat = (id, v) => document.getElementById(id).textContent = v;

document.getElementById('prompt').textContent = PROMPT;

let engine = null;

window.loadModel = async () => {
  document.getElementById('load-btn').disabled = true;
  setStatus('loading library...');
  log('Importing @mlc-ai/web-llm from CDN...');

  try {
    const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm');
    log('Library loaded, creating engine...');
    setStatus('downloading model...');

    const startTime = performance.now();

    engine = await CreateMLCEngine('gemma-2-2b-it-q4f16_1-MLC', {
      initProgressCallback: (p) => {
        const pct = Math.round(p.progress * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        setStatus(p.text);
        log(`progress ${pct}% — ${p.text}`);
      },
    });

    const loadTime = ((performance.now() - startTime) / 1000).toFixed(1);
    setStat('load-time', loadTime + 's');
    setStatus('✅ ready');
    log(`Engine ready in ${loadTime}s`);
    document.getElementById('run-btn').disabled = false;
  } catch (e) {
    setStatus('❌ failed');
    log('ERROR: ' + e.message);
    console.error(e);
  }
};

window.runInference = async () => {
  if (!engine) return;
  document.getElementById('run-btn').disabled = true;
  setStatus('generating...');
  document.getElementById('output').textContent = '';

  const start = performance.now();
  let firstTokenTime = null;
  let tokenCount = 0;

  try {
    const stream = await engine.chat.completions.create({
      messages: [{ role: 'user', content: PROMPT }],
      stream: true,
      max_tokens: 250,
    });

    for await (const chunk of stream) {
      if (firstTokenTime === null) {
        firstTokenTime = performance.now();
        setStat('ttft', ((firstTokenTime - start) / 1000).toFixed(2) + 's');
      }
      const delta = chunk.choices[0]?.delta?.content ?? '';
      if (delta) {
        document.getElementById('output').textContent += delta;
        tokenCount++;
      }
    }

    const totalTime = (performance.now() - firstTokenTime) / 1000;
    const tps = (tokenCount / totalTime).toFixed(1);
    setStat('tokens', tokenCount);
    setStat('tps', tps + ' tok/s');
    setStatus('✅ done');
    log(`Generated ${tokenCount} tokens at ${tps} tok/s`);
  } catch (e) {
    setStatus('❌ failed');
    log('ERROR: ' + e.message);
  }

  document.getElementById('run-btn').disabled = false;
};
</script>
</body>
</html>
